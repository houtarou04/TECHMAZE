<!DOCTYPE HTML>
<html dir="rtl" lang="ar">
<head>
    <title>قسم الادوات </title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="data/main.js" defer></script>
</head>
<body>

<header id="mainHead">
</header>

<h1>مقالات البرمجة</h1>
<div id="posts" class="container"></div> <!-- غيرنا class إلى id -->

<script>
fetch('data/posts.json')
  .then(res => res.json())
  .then(posts => {
    const container = document.getElementById('posts');
    
    // الفلتر: خلي بس اللي تصنيفهم programming
    const programmingPosts = posts.filter(post => post.category === 'tools');
    
    programmingPosts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'card'; // هذا حق التصميم من style.css
      card.innerHTML = `
        <div class="img-box">
          <img src="${post.image}" alt="${post.title}">
        </div>
        <h3>${post.title}</h3>
        <p>${post.description}</p>
        <small>${post.category}</small>
      `;
      card.onclick = () => { window.location.href = post.url; };
      container.appendChild(card);
    });
  })
  .catch(err => console.error("خطأ في جلب البيانات:", err));
</script>

<footer>
</footer>
</body>
</html>
